name: Build systemshock for ARM64

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for running aarch64 containers)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Copy build script
        run: |
          chmod +x .github/scripts/arm_build.sh

      - name: Run build inside aarch64 container
        run: |
          echo "Starting ARM64 docker build"
          docker run --rm --platform linux/arm64 -v "${{ github.workspace }}":/work -w /work ubuntu:22.04 bash -lc "/work/.github/scripts/arm_build.sh"

      - name: Upload shockolate-arm64.zip
        uses: actions/upload-artifact@v4
        with:
          name: shockolate-arm64
          path: shockolate-arm64.zip