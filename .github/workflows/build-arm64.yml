name: Build systemshock for ARM64

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM64 cross-build dependencies
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake make zip pkg-config \
            libsdl2-dev:arm64 libsdl2-mixer-dev:arm64 libfluidsynth-dev:arm64 libasound2-dev:arm64 \
            libgl1-mesa-dev:arm64 libglu1-mesa-dev:arm64 libx11-dev:arm64 libxrandr-dev:arm64 libxext-dev:arm64 \
            libxinerama-dev:arm64 libxrender-dev:arm64 libxt-dev:arm64 libxss-dev:arm64 libxxf86vm-dev:arm64

      - name: Configure ARM64 cross build
        run: |
          cd systemshock
          mkdir -p build
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_ALLOW_CROSS=1
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_SYSROOT=/usr/aarch64-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH=/usr/aarch64-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DENABLE_SDL2=ON \
            -DENABLE_SOUND=ON \
            -DENABLE_FLUIDSYNTH=ON

      - name: Build systemshock
        run: |
          cd systemshock/build
          make -j$(nproc)

      - name: Package artifact
        run: |
          mkdir -p artifact/bin artifact/data
          cp systemshock artifact/bin/
          cp ../README_PORTMASTER.md artifact/
          cd artifact
          zip -r ../shockolate-arm64.zip .

      - name: Upload shockolate-arm64.zip
        uses: actions/upload-artifact@v4
        with:
          name: shockolate-arm64
          path: shockolate-arm64.zip