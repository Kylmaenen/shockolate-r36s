name: Build Shockolate for ARM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shockolate
        uses: actions/checkout@v4
        with:
          repository: Interrupt/systemshock
          submodules: recursive

      - name: Build in ARM Docker container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          install: |
            apt-get update
            apt-get install -y \
              cmake g++ \
              libsdl2-dev libsdl2-mixer-dev \
              libfluidsynth-dev \
              libalsa-ocaml-dev libasound2-dev \
              git
          run: |
            mkdir build && cd build
            cmake .. -DENABLE_FLUIDSYNTH=OFF
            make -j$(nproc)

      - name: Collect binary
        run: |
          mkdir -p artifact/SystemShock
          find /home/runner -name systemshock -type f 2>/dev/null | \
            head -1 | xargs -I{} cp {} artifact/SystemShock/ || true
          find /tmp -name systemshock -type f 2>/dev/null | \
            head -1 | xargs -I{} cp {} artifact/SystemShock/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shockolate-arm64
          path: artifact/
