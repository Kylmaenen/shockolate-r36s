name: Build Shockolate for ARM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shockolate
        uses: actions/checkout@v4
        with:
          repository: Interrupt/systemshock
          submodules: recursive

      - name: Build in ARM Docker container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          install: |
            apt-get update
            apt-get install -y \
              cmake g++ git \
              libsdl2-dev libsdl2-mixer-dev \
              libfluidsynth-dev \
              libasound2-dev \
              pkg-config
          run: |
            echo "=== SDL2 pkg-config check ==="
            pkg-config --libs sdl2 || true
            pkg-config --libs SDL2_mixer || true
            echo "=== SDL2 files ==="
            find /usr -name "libSDL2*" 2>/dev/null
            echo "=== Building ==="
            mkdir build && cd build
            cmake .. \
              -DSDL2_INCLUDE_DIR=$(pkg-config --variable=includedir sdl2)/SDL2 \
              -DSDL2_LIBRARY=$(pkg-config --variable=libdir sdl2)/libSDL2.so \
              -DSDL2MAIN_LIBRARY=$(pkg-config --variable=libdir sdl2)/libSDL2main.a
            make -j$(nproc)

      - name: Collect binary
        run: |
          mkdir -p artifact/SystemShock
          find /home/runner -name systemshock -type f 2>/dev/null | \
            head -1 | xargs -I{} cp {} artifact/SystemShock/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shockolate-arm64
          path: artifact/
