name: Build Shockolate for ARM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shockolate
        uses: actions/checkout@v4
        with:
          repository: Interrupt/systemshock
          submodules: recursive

      - name: Build in ARM Docker container
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          install: |
            apt-get update
            apt-get install -y \
              cmake g++ git \
              libsdl2-dev libsdl2-mixer-dev \
              libfluidsynth-dev \
              libasound2-dev \
              pkg-config
          run: |
            ln -s /usr/include/SDL2/SDL.h /usr/include/SDL.h || true
            ln -s /usr/include/SDL2 /usr/include/SDL2_compat || true
            mkdir build && cd build
            cmake .. \
              -DCMAKE_BUILD_PARALLEL_LEVEL=1
            make -j1
      
      - name: Collect binary
        run: |
          mkdir -p artifact/SystemShock
          find / -name systemshock -type f 2>/dev/null | \
            head -1 | xargs -I{} cp {} artifact/SystemShock/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shockolate-arm64
          path: artifact/
